<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCSF - Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9fafb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }
        h1 {
            color: #111;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .tagline {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            color: #2563eb;
            text-decoration: none;
            padding: 12px 24px;
            border: 2px solid #2563eb;
            border-radius: 8px;
            transition: all 0.2s;
        }
        a:hover {
            background-color: #2563eb;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MyCSF</h1>
        <p class="tagline">Your California Scholarship Federation companion app</p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="support.html">Support</a>
        </div>
    </div>
</body>
</html>
